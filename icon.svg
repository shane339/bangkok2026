<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A0522D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7B3F00;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700" />
      <stop offset="100%" style="stop-color:#C8960C" />
    </linearGradient>
  </defs>

  <!-- Background rounded rect -->
  <rect width="512" height="512" rx="110" ry="110" fill="url(#bg)"/>

  <!-- Thai flag stripes (decorative, bottom portion) -->
  <clipPath id="clip">
    <rect width="512" height="512" rx="110" ry="110"/>
  </clipPath>
  <g clip-path="url(#clip)">
    <!-- Red stripe top -->
    <rect x="0" y="0" width="512" height="72" fill="#A51931"/>
    <!-- White stripe -->
    <rect x="0" y="72" width="512" height="48" fill="#F4F5F0"/>
    <!-- Blue stripe center -->
    <rect x="0" y="120" width="512" height="72" fill="#2D2A4A"/>
    <!-- White stripe -->
    <rect x="0" y="192" width="512" height="48" fill="#F4F5F0"/>
    <!-- Red stripe bottom -->
    <rect x="0" y="240" width="512" height="272" fill="#A51931"/>

    <!-- Dark overlay for text readability -->
    <rect x="0" y="0" width="512" height="512" fill="rgba(60,20,0,0.55)"/>
  </g>

  <!-- Gold circle backdrop for character -->
  <circle cx="256" cy="230" r="148" fill="url(#gold)" opacity="0.15"/>
  <circle cx="256" cy="230" r="136" fill="none" stroke="url(#gold)" stroke-width="3" opacity="0.6"/>

  <!-- 曼 character -->
  <text
    x="256"
    y="298"
    font-family="'Noto Serif TC', 'STSong', 'SimSun', serif"
    font-size="210"
    font-weight="900"
    text-anchor="middle"
    fill="url(#gold)"
    letter-spacing="-4"
  >曼</text>

  <!-- Small Thai flag icon top-right -->
  <g transform="translate(330, 52)">
    <rect x="0" y="0" width="108" height="18" rx="2" fill="#A51931"/>
    <rect x="0" y="18" width="108" height="12" rx="0" fill="#F4F5F0"/>
    <rect x="0" y="30" width="108" height="18" rx="0" fill="#2D2A4A"/>
    <rect x="0" y="48" width="108" height="12" rx="0" fill="#F4F5F0"/>
    <rect x="0" y="60" width="108" height="18" rx="2" fill="#A51931"/>
  </g>

  <!-- Bottom label -->
  <text
    x="256"
    y="430"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="38"
    font-weight="700"
    text-anchor="middle"
    fill="#FFD700"
    letter-spacing="8"
    opacity="0.9"
  >BANGKOK</text>

  <text
    x="256"
    y="472"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="22"
    font-weight="400"
    text-anchor="middle"
    fill="#FFD700"
    letter-spacing="4"
    opacity="0.65"
  >2026</text>
</svg>
