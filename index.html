<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>🇹🇭 曼谷城市漫遊 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --cream: #FFFDF5;
  --gold: #C8A96E;
  --gold-dark: #735C00;
  --gold-light: #F5ECC8;
  --gold-border: #E8D99A;
  --text: #1C1C19;
  --text-muted: #735C00;
  --white: #FFFFFF;
  --bg-card: #FFFFFF;
  --bg-tip: #FFFBEA;
  --font-serif: 'Noto Serif TC', serif;
  --font-sans: 'Noto Sans TC', sans-serif;
}

html { background: var(--cream); scroll-behavior: smooth; }
body { font-family: var(--font-sans); color: var(--text); background: var(--cream); min-height: 100vh; }

/* ── STICKY TOP NAV ──────────────────────────── */
.top-nav {
  position: sticky; top: 0; z-index: 100;
  background: rgba(255,253,245,0.96);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--gold-border);
  padding: 10px 16px 0;
}
.nav-brand {
  display: flex; align-items: baseline; gap: 8px; margin-bottom: 10px;
}
.nav-brand .vol { font-family: monospace; font-size: 10px; color: #A08030; letter-spacing: 0.2em; }
.nav-brand .title { font-family: var(--font-serif); font-size: 18px; font-weight: 900; color: var(--text); }
.nav-brand .sub { font-family: var(--font-serif); font-size: 12px; color: var(--gold-dark); font-style: italic; }
.nav-brand { justify-content: space-between; align-items: center; }
.ledger-btn {
  flex-shrink: 0;
  font-family: var(--font-sans); font-size: 11px; font-weight: 700;
  color: var(--gold-dark);
  background: var(--gold-light);
  border: 1.5px solid var(--gold-border);
  border-radius: 16px;
  padding: 5px 11px;
  text-decoration: none;
  white-space: nowrap;
  display: flex; align-items: center; gap: 4px;
}
.ledger-btn:active { background: var(--gold-border); }

/* Day tabs - horizontal scroll */
.day-tabs {
  display: flex; gap: 6px; overflow-x: auto; padding-bottom: 10px;
  scrollbar-width: none; -ms-overflow-style: none;
}
.day-tabs::-webkit-scrollbar { display: none; }
.day-tab {
  flex-shrink: 0; padding: 8px 14px;
  border: 1.5px solid var(--gold-border);
  border-radius: 20px; cursor: pointer;
  background: var(--white); transition: all 0.2s;
  display: flex; flex-direction: column; align-items: center; gap: 1px;
}
.day-tab.active {
  background: var(--gold-dark); border-color: var(--gold-dark);
}
.day-tab .tab-day {
  font-family: monospace; font-size: 9px; letter-spacing: 0.1em;
  color: #A08030; font-weight: 600;
}
.day-tab.active .tab-day { color: var(--gold-light); }
.day-tab .tab-label {
  font-family: var(--font-serif); font-size: 12px; font-weight: 700;
  color: var(--text); white-space: nowrap;
}
.day-tab.active .tab-label { color: #FFFDF5; }

/* ── PAGES ───────────────────────────────────── */
.page { display: none; }
.page.active { display: block; animation: fadeUp 0.3s ease both; }
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── HERO PHOTO + TITLE ──────────────────────── */
.day-hero { position: relative; height: 220px; overflow: hidden; }
.day-hero img {
  width: 100%; height: 100%; object-fit: cover;
  filter: brightness(0.75);
}
.day-hero-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(transparent 20%, rgba(0,0,0,0.75) 100%);
  display: flex; flex-direction: column; justify-content: flex-end;
  padding: 16px;
}
.hero-day-label {
  font-family: monospace; font-size: 11px; letter-spacing: 0.2em;
  font-weight: 600; margin-bottom: 4px;
  text-shadow: 0 1px 4px rgba(0,0,0,0.8);
}
.hero-title {
  font-family: var(--font-serif); font-size: 28px; font-weight: 900;
  color: #F5ECC8; line-height: 1.1; margin-bottom: 4px;
  text-shadow: 0 2px 8px rgba(0,0,0,0.9);
}
.hero-subtitle {
  font-family: monospace; font-size: 11px; color: rgba(245,236,200,0.85);
  letter-spacing: 0.08em; text-shadow: 0 1px 4px rgba(0,0,0,0.7);
}

/* ── NOTE BANNER (isNote items) ──────────────── */
.note-banner {
  margin: 12px 16px 0;
  padding: 12px 14px;
  border-radius: 8px;
  border-left: 4px solid var(--gold);
  background: #FFF8E1;
}
.note-banner .note-title {
  font-family: var(--font-serif); font-size: 14px; font-weight: 700;
  color: var(--text); margin-bottom: 4px;
}
.note-banner .note-desc {
  font-size: 13px; color: var(--text); line-height: 1.6;
}

/* ── SECTION LABEL ───────────────────────────── */
.section-label {
  margin: 16px 16px 8px;
  font-family: monospace; font-size: 10px; letter-spacing: 0.2em;
  color: #A08030; font-weight: 600;
  border-bottom: 1px solid var(--gold-border); padding-bottom: 6px;
}

/* ── SCHEDULE ITEMS ──────────────────────────── */
.schedule { margin: 0 16px; }
.sched-item {
  border-left: 2px solid var(--gold-border);
  padding-left: 16px; position: relative;
  margin-bottom: 2px;
}
.sched-dot {
  position: absolute; left: -5px; top: 18px;
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--gold); border: 2px solid var(--cream);
  transition: background 0.2s;
}
.sched-header {
  padding: 14px 0 12px;
  border-bottom: 1px solid #F0E6B0;
  cursor: pointer;
}
.sched-header:active { background: #FFFBEA; }
.sched-time {
  font-family: monospace; font-size: 12px; font-weight: 600;
  color: var(--gold-dark); margin-bottom: 4px; letter-spacing: 0.05em;
}
.sched-title {
  font-family: var(--font-serif); font-size: 16px; font-weight: 700;
  color: var(--text); line-height: 1.35; margin-bottom: 6px;
}
.sched-meta {
  display: flex; flex-wrap: wrap; gap: 6px; align-items: center;
}
.map-btn {
  display: inline-flex; align-items: center; gap: 3px;
  font-family: monospace; font-size: 10px; font-weight: 600;
  color: var(--gold-dark); border: 1.5px solid var(--gold);
  padding: 4px 10px; border-radius: 4px; text-decoration: none;
  background: transparent; letter-spacing: 0.05em;
}
.tag {
  font-family: monospace; font-size: 10px;
  color: var(--gold-dark); border: 1px solid var(--gold-border);
  padding: 3px 8px; border-radius: 3px; background: #FFFBEA;
}
.sched-body {
  padding: 10px 0 14px;
  display: none;
}
.sched-body.open { display: block; }
.sched-desc {
  font-size: 13px; color: var(--text); line-height: 1.75;
  white-space: pre-line; margin-bottom: 8px;
}
.editorial-note {
  background: #FFF8D6; border-left: 3px solid var(--gold);
  padding: 10px 12px; border-radius: 0 6px 6px 0; margin-top: 8px;
}
.editorial-label {
  font-family: monospace; font-size: 10px; letter-spacing: 0.15em;
  font-weight: 600; margin-bottom: 5px;
}
.editorial-text {
  font-size: 12px; color: var(--text); line-height: 1.7;
  font-style: italic;
}

/* ── TIPS BLOCK ──────────────────────────────── */
.tips-block {
  margin: 12px 16px;
  background: var(--bg-tip);
  border: 1px solid var(--gold-border);
  border-top-width: 2px;
  border-radius: 6px;
  padding: 14px;
}
.tips-label {
  font-family: monospace; font-size: 11px; letter-spacing: 0.15em;
  font-weight: 700; margin-bottom: 10px;
}
.tip-row {
  display: flex; gap: 8px; margin-bottom: 7px;
  font-size: 13px; color: var(--text); line-height: 1.6;
}
.tip-arrow { flex-shrink: 0; }

/* ── TODAY INFO (Survival) ───────────────────── */
.today-info {
  margin: 0 16px 16px;
  background: var(--white);
  border: 1px solid var(--gold-border);
  border-top-width: 2px;
  border-radius: 6px;
  padding: 14px;
}
.today-info-label {
  font-family: monospace; font-size: 11px; letter-spacing: 0.15em;
  font-weight: 700; margin-bottom: 12px;
}
.info-item {
  display: flex; gap: 12px; align-items: flex-start;
  padding: 10px 0; border-bottom: 1px solid #F0E6B0;
}
.info-item:last-child { border-bottom: none; padding-bottom: 0; }
.info-icon { font-size: 20px; flex-shrink: 0; line-height: 1.3; }
.info-content { flex: 1; min-width: 0; }
.info-label {
  font-family: var(--font-serif); font-size: 14px; font-weight: 700;
  color: var(--text); margin-bottom: 3px;
}
.info-detail {
  font-size: 12px; color: var(--text); line-height: 1.65;
}
.info-map {
  display: inline-flex; align-items: center; gap: 2px;
  font-family: monospace; font-size: 10px; font-weight: 600;
  color: var(--gold-dark); border: 1.5px solid var(--gold);
  padding: 4px 8px; border-radius: 4px; text-decoration: none;
  flex-shrink: 0; margin-top: 2px;
}

/* ── PHOTO GRID (2-col at bottom of day) ─────── */
.photo-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 3px;
  margin: 12px 16px 0; height: 160px;
}
.photo-grid .photo-main {
  grid-row: 1 / 3; height: 100%;
}
.photo-tile {
  overflow: hidden; position: relative; border-radius: 4px; background: #E8D99A;
}
.photo-tile img {
  width: 100%; height: 100%; object-fit: cover;
  display: block; filter: brightness(0.88);
}
.photo-tile .photo-cap {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: linear-gradient(transparent, rgba(0,0,0,0.65));
  padding: 10px 7px 5px;
  font-family: monospace; font-size: 8px; letter-spacing: 0.1em;
  color: rgba(245,236,200,0.9);
}
.photo-grid .photo-col { display: flex; flex-direction: column; gap: 3px; }
.photo-col .photo-tile { flex: 1; }

/* ── SPACER ─────────────────────────────────── */
.day-spacer { height: 24px; }

/* ── CHEVRON ─────────────────────────────────── */
.chevron {
  display: inline-block; width: 16px; height: 16px;
  position: relative; margin-left: auto; flex-shrink: 0;
}
.chevron::before, .chevron::after {
  content: ''; position: absolute; width: 7px; height: 1.5px;
  background: var(--gold-dark); border-radius: 2px; top: 7px;
}
.chevron::before { left: 1px; transform: rotate(45deg); }
.chevron::after  { left: 6px; transform: rotate(-45deg); }
.chevron.open::before { transform: rotate(-45deg); }
.chevron.open::after  { transform: rotate(45deg); }

/* ── BOTTOM PADDING for iOS home bar ─────────── */
.bottom-pad { height: env(safe-area-inset-bottom, 20px); min-height: 20px; }
</style>
</head>

// ── Render ──────────────────────────────────────────────────────
let activeDay = 0;
let openItems = {};

function mapBtn(url, label) {
  if (!url) return '';
  return `<a class="map-btn" href="${url}" target="_blank">⊕ ${label||'MAP'}</a>`;
}

function renderTabs() {
  const tabs = document.getElementById('dayTabs');
  tabs.innerHTML = DAYS.map((d, i) => `
    <div class="day-tab ${i===activeDay?'active':''}" onclick="showDay(${i})" id="tab_${i}">
      <span class="tab-day">D${d.day} · ${d.date.split(' ')[0]}</span>
      <span class="tab-label">${d.label}</span>
    </div>
  `).join('');
  // Scroll active tab into view
  setTimeout(() => {
    const el = document.getElementById(`tab_${activeDay}`);
    if (el) el.scrollIntoView({behavior:'smooth', block:'nearest', inline:'center'});
  }, 50);
}

function renderPages() {
  const container = document.getElementById('pages');
  container.innerHTML = DAYS.map((d, dayIdx) => {
    const color = d.color;
    const photos = DAY_PHOTOS[dayIdx] || [];
    const survItems = SURVIVAL_BY_DAY[dayIdx] || [];

    // Separate note items from regular schedule
    const notes = d.schedule.filter(s => s.isNote);
    const items = d.schedule.filter(s => !s.isNote);

    // Hero photo = first photo
    const heroPhoto = photos[0] ? `<img src="${photos[0].url}" alt="${photos[0].cap}" loading="lazy"/>` : `<div style="background:${color}33;width:100%;height:100%;"></div>`;

    // Note banners
    const noteBanners = notes.map(n => `
      <div class="note-banner" style="border-left-color:${color};">
        <div class="note-title">${n.title}</div>
        <div class="note-desc">${n.desc}</div>
      </div>
    `).join('');

    // Schedule items
    const schedHtml = items.map((item, i) => {
      const key = `${dayIdx}_${i}`;
      const isOpen = item.open || openItems[key];
      return `
      <div class="sched-item">
        <div class="sched-dot" id="dot_${key}" style="background:${isOpen ? color : '#D4AF37'};"></div>
        <div class="sched-header" ${item.open ? '' : `onclick="toggleItem('${key}','${color}')"`}>
          ${item.time ? `<div class="sched-time">${item.time}</div>` : ''}
          <div style="display:flex;align-items:flex-start;gap:8px;">
            <div class="sched-title" style="flex:1;">${item.title}</div>
            ${item.open ? '' : `<div class="chevron ${isOpen?'open':''}" id="chev_${key}"></div>`}
          </div>
          <div class="sched-meta">
            ${item.maps ? mapBtn(item.maps) : ''}
            ${(item.tags||[]).map(t=>`<span class="tag">${t}</span>`).join('')}
          </div>
        </div>
        <div class="sched-body ${isOpen?'open':''}" id="body_${key}">
          <div class="sched-desc">${item.desc||''}</div>
          ${item.editorial ? `
          <div class="editorial-note">
            <div class="editorial-label" style="color:${color};">✦ EDITORIAL NOTE</div>
            <div class="editorial-text">${item.editorial}</div>
          </div>` : ''}
        </div>
      </div>`;
    }).join('');

    // Tips
    const tipsHtml = d.tips && d.tips.length ? `
      <div class="tips-block" style="border-top-color:${color};">
        <div class="tips-label" style="color:${color};">✦ TIPS</div>
        ${d.tips.map(t=>`<div class="tip-row"><span class="tip-arrow" style="color:${color};">›</span><span>${t}</span></div>`).join('')}
      </div>` : '';

    // Survival info
    const survHtml = survItems.length ? `
      <div class="today-info" style="border-top-color:${color};">
        <div class="today-info-label" style="color:${color};">✦ 今日實用情報</div>
        ${survItems.map(s=>`
        <div class="info-item">
          <span class="info-icon">${s.icon}</span>
          <div class="info-content">
            <div class="info-label">${s.label}</div>
            <div class="info-detail">${s.detail}</div>
          </div>
          ${s.maps ? `<a class="info-map" href="${s.maps}" target="_blank">⊕ MAP</a>` : ''}
        </div>`).join('')}
      </div>` : '';

    // Photo grid (2nd and 3rd photos)
    const photoGridHtml = photos.length >= 2 ? `
      <div class="photo-grid">
        <div class="photo-tile photo-main">
          <img src="${photos[1].url}" alt="${photos[1].cap}" loading="lazy"/>
          <div class="photo-cap">${photos[1].cap.toUpperCase()}</div>
        </div>
        <div class="photo-col">
          ${photos[2] ? `<div class="photo-tile">
            <img src="${photos[2].url}" alt="${photos[2].cap}" loading="lazy"/>
            <div class="photo-cap">${photos[2].cap.toUpperCase()}</div>
          </div>` : ''}
        </div>
      </div>` : '';

    return `
    <div class="page ${dayIdx===activeDay?'active':''}" id="page_${dayIdx}">

      <!-- Hero -->
      <div class="day-hero">
        ${heroPhoto}
        <div class="day-hero-overlay">
          <div class="hero-day-label" style="color:${color};">DAY ${d.day} · ${d.date} · ${d.emoji}</div>
          <div class="hero-title">${d.label}</div>
          <div class="hero-subtitle">${d.subtitle}</div>
        </div>
      </div>

      <!-- Note banners -->
      ${noteBanners}

      <!-- Schedule -->
      <div class="section-label">── ITINERARY ──────────────</div>
      <div class="schedule">${schedHtml}</div>

      <!-- Tips -->
      ${tipsHtml}

      <!-- Today Info -->
      ${survHtml}

      <!-- Photos -->
      ${photoGridHtml}
      <div class="day-spacer"></div>
    </div>`;
  }).join('');
}

function showDay(idx) {
  document.getElementById(`page_${activeDay}`)?.classList.remove('active');
  activeDay = idx;
  openItems = {};
  document.getElementById(`page_${idx}`)?.classList.add('active');
  renderTabs();
  window.scrollTo({top: 0, behavior: 'smooth'});
}

function toggleItem(key, color) {
  openItems[key] = !openItems[key];
  const body = document.getElementById(`body_${key}`);
  const chev = document.getElementById(`chev_${key}`);
  const dot  = document.getElementById(`dot_${key}`);
  if (body) body.classList.toggle('open', openItems[key]);
  if (chev) chev.classList.toggle('open', openItems[key]);
  if (dot)  dot.style.background = openItems[key] ? color : '#D4AF37';
}

// Init
renderPages();
renderTabs();
</script>
